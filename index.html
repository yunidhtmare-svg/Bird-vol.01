<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>3D Realistic Bird - AR Flight (Reverse Scene)</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #video { position: absolute; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); z-index: -1; }
        #ui { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.85); padding: 20px; border-radius: 12px; color: white; z-index: 10; width: 280px; border: 1px solid #444; }
        .score { position: absolute; top: 20px; right: 20px; color: #00ffcc; font-size: 24px; font-weight: bold; background: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 8px; }
        button { width: 100%; padding: 12px; margin-top: 15px; background: #00d4ff; border: none; color: #000; font-weight: bold; border-radius: 6px; cursor: pointer; }
        button:hover { background: #00b8e6; }
        #status { font-size: 13px; color: #aaa; margin-top: 10px; }
    </style>
</head>
<body>
    <video id="video" autoplay playsinline muted></video>
    <div id="ui">
        <strong style="display:block; margin-bottom:10px;">3D 真實鳥類飛行模擬 (反向場景)</strong>
        <input type="file" id="midiInput" accept=".mid,.midi">
        <button id="startBtn">進入飛行場景</button>
        <p id="status">等待載入 MIDI 檔案...</p>
    </div>
    <div class="score">碰撞損害: <span id="hits">0</span> / 3</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tonejs/midi@2.0.28/build/Midi.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tone@14.8.49/build/Tone.js"></script>
    <script type="module">
        import { FilesetResolver, PoseLandmarker } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.32/vision_bundle.mjs";

        // --- 1. Three.js 場景建構 ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // 光照系統
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambientLight);
        const sunLight = new THREE.DirectionalLight(0xffffff, 1.2);
        sunLight.position.set(5, 15, 5);
        sunLight.castShadow = true;
        scene.add(sunLight);

        // --- 2. 打造真實感小鳥模型 ---
        function createRealisticBird() {
            const group = new THREE.Group();

            // 身體：蛋形流線體
            const bodyGeo = new THREE.SphereGeometry(0.6, 32, 24);
            bodyGeo.scale(0.8, 1, 1.4);
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0x999999, roughness: 0.6 });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.castShadow = true;
            group.add(body);

            // 橘紅胸脯 (特徵點)
            const chestGeo = new THREE.SphereGeometry(0.45, 32, 24);
            chestGeo.scale(0.8, 0.9, 0.8);
            const chestMat = new THREE.MeshStandardMaterial({ color: 0xD35400 });
            const chest = new THREE.Mesh(chestGeo, chestMat);
            chest.position.set(0, -0.15, 0.45);
            group.add(chest);

            // 擬真翅膀：使用多層羽毛感
            const wingShape = new THREE.Shape();
            wingShape.moveTo(0, 0);
            wingShape.quadraticCurveTo(-1.5, 0.5, -2.5, -0.5);
            wingShape.quadraticCurveTo(-1.0, -1.0, 0, 0);
            
            const wingGeo = new THREE.ShapeGeometry(wingShape);
            const wingMat = new THREE.MeshStandardMaterial({ color: 0x666666, side: THREE.DoubleSide });

            const leftWingRoot = new THREE.Group();
            const leftWingMesh = new THREE.Mesh(wingGeo, wingMat);
            leftWingMesh.rotation.x = -Math.PI / 2;
            leftWingRoot.add(leftWingMesh);
            leftWingRoot.position.set(-0.35, 0.2, 0);

            const rightWingRoot = new THREE.Group();
            const rightWingMesh = new THREE.Mesh(wingGeo, wingMat);
            rightWingMesh.scale.x = -1;
            rightWingMesh.rotation.x = -Math.PI / 2;
            rightWingRoot.add(rightWingMesh);
            rightWingRoot.position.set(0.35, 0.2, 0);

            group.add(leftWingRoot, rightWingRoot);

            // 頭部與細節
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.38, 32, 24), new THREE.MeshStandardMaterial({ color: 0x444444 }));
            head.position.set(0, 0.5, 0.9);
            group.add(head);

            const beak = new THREE.Mesh(new THREE.ConeGeometry(0.08, 0.3, 8), new THREE.MeshStandardMaterial({ color: 0x222222 }));
            beak.rotation.x = Math.PI / 2.5;
            beak.position.set(0, 0.5, 1.3);
            group.add(beak);

            return { group, leftWing: leftWingRoot, rightWing: rightWingRoot };
        }

        const bird = createRealisticBird();
        scene.add(bird.group);
        // --- 調整 1: 將鳥移動到攝影機後面 (正 z 軸) ---
        bird.group.position.z = 6;

        // 地面與攝影機位置
        const grid = new THREE.GridHelper(300, 80, 0x00d4ff, 0x333333);
        grid.position.y = -3;
        scene.add(grid);
        // --- 調整 2: 攝影機看向正 z 軸方向 ---
        camera.position.set(0, 3, 0); 
        camera.lookAt(0, 0, 10);

        // --- 3. 姿態與飛行邏輯 ---
        let poseLandmarker, obstacles = [], isPlaying = false, score = 0;
        const Z_SPEED = 14;

        async function initPose() {
            const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.32/wasm");
            poseLandmarker = await PoseLandmarker.createFromOptions(vision, {
                baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/latest/pose_landmarker_lite.task" },
                runningMode: "VIDEO", numPoses: 1
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            if (isPlaying) {
                const time = Tone.Transport.seconds;
                // --- 調整 3: 地面移動方向反轉 (加上負號) ---
                grid.position.z = -(time * Z_SPEED) % 4;

                if (poseLandmarker && video.videoWidth > 0) {
                    const results = poseLandmarker.detectForVideo(video, performance.now());
                    if (results.landmarks && results.landmarks[0]) {
                        const lm = results.landmarks[0];
                        
                        const centerX = (lm[11].x + lm[12].x) * 0.5;
                        const targetX = (centerX - 0.5) * 14; 
                        bird.group.position.x += (targetX - bird.group.position.x) * 0.1;
                        
                        bird.group.rotation.y = (targetX - bird.group.position.x) * -0.2;
                        bird.group.rotation.z = (targetX - bird.group.position.x) * 0.3;

                        const handLift = (lm[11].y - lm[15].y + lm[12].y - lm[16].y) * 0.5;
                        const targetY = Math.max(-2, Math.min(5, handLift * 15));
                        bird.group.position.y += (targetY - bird.group.position.y) * 0.1;

                        const flap = Math.sin(Date.now() * 0.012) * (0.3 + handLift);
                        bird.leftWing.rotation.z = flap - 0.2;
                        bird.rightWing.rotation.z = -flap + 0.2;
                    }
                }

                obstacles.forEach(obj => {
                    // --- 調整 4: 障礙物從正 z 軸遠處靠近 (方向反轉) ---
                    obj.mesh.position.z = obj.startZ - (time * Z_SPEED);
                    if (!obj.hit && obj.mesh.position.distanceTo(bird.group.position) < 1.6) {
                        obj.hit = true; score++;
                        document.getElementById("hits").innerText = score;
                        obj.mesh.material.emissive.setHex(0xff0000);
                        if(score >= 3) { isPlaying = false; alert("損害過重！"); location.reload(); }
                    }
                });
            }
            renderer.render(scene, camera);
        }

        // --- 4. 檔案與按鈕事件 ---
        const video = document.getElementById("video");
        const midiInput = document.getElementById("midiInput");

        midiInput.onchange = async (e) => {
            const midi = new Midi(await e.target.files[0].arrayBuffer());
            obstacles.forEach(o => scene.remove(o.mesh));
            obstacles = [];
            midi.tracks[0].notes.forEach(note => {
                const x = ((note.midi % 12) - 6) * 1.8;
                const y = note.midi > 64 ? 2 : -0.5;
                const mesh = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1.5, 1.5), new THREE.MeshStandardMaterial({ color: 0xff4444 }));
                // --- 調整 5: 障礙物初始 z 軸位置 (確保從遠處靠近) ---
                mesh.position.set(x, y, note.time * Z_SPEED + 20); // 增加一個偏移量確保從螢幕遠處出現
                mesh.castShadow = true;
                scene.add(mesh);
                obstacles.push({ startZ: note.time * Z_SPEED + 20, mesh, hit: false, time: note.time, midi: note.midi });
            });
            document.getElementById("status").innerText = "MIDI 檔案已備妥！";
        };

        document.getElementById("startBtn").onclick = async () => {
            if(!obstacles.length) return alert("請先上傳 MIDI！");
            await Tone.start();
            const synth = new Tone.PolySynth().toDestination();
            new Tone.Part((time, val) => {
                synth.triggerAttackRelease(Tone.Frequency(val.midi, "midi"), "8n", time);
            }, obstacles.map(o => ({ time: o.time, midi: o.midi }))).start(0);
            
            Tone.Transport.start();
            isPlaying = true;
            document.getElementById("ui").style.display = "none";
        };

        navigator.mediaDevices.getUserMedia({ video: true }).then(s => {
            video.srcObject = s;
            initPose().then(animate);
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
